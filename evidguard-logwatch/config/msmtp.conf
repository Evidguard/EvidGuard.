# /etc/msmtprc — Configuración msmtp para EvidGuard
#
# PASOS:
#   1. Edita las 3 líneas marcadas con TU_... con tus datos
#   2. Genera un App Password en: https://myaccount.google.com/apppasswords
#      (requiere verificación en dos pasos activada en Gmail)
#   3. El App Password son 16 caracteres SIN espacios: abcdefghijklmnop
#
# IMPORTANTE: no pongas nada después del valor en estas líneas,
#             ni comentarios ni espacios extra.

defaults
auth           on
tls            on
tls_trust_file /etc/ssl/certs/ca-certificates.crt
logfile        /var/log/evidguard/msmtp.log

account        gmail
host           smtp.gmail.com
port           587
from           TU_EMAIL@gmail.com
user           TU_EMAIL@gmail.com
password       TU_APP_PASSWORD_SIN_ESPACIOS

account default : gmail
