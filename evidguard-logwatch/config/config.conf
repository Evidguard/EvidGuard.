########################################################
# EvidGuard LogWatch v5 — Configuración
########################################################

# Email donde recibirás los informes
MAIL_TO="TU_EMAIL@gmail.com"

# Email remitente (la cuenta configurada en /etc/msmtprc)
MAIL_FROM="TU_EMAIL@gmail.com"

# Prefijo del asunto del correo
MAIL_SUBJECT="[EvidGuard] Actividad rclone"

# Ruta del log de rclone manager.
# AUTO = se detecta automáticamente según el sistema (recomendado).
# Si falla, pon la ruta completa manualmente, por ejemplo:
#   /home/bel/.cache/com.rclone.manager/logs/rclone/main_engine.log
RCLONE_GUI_LOG="AUTO"

# Tiempo mínimo entre correos de RESUMEN en segundos.
# Los correos de ERROR siempre se envían al instante, ignorando este valor.
COOLDOWN=600

# Líneas del log a analizar si no se detecta un marcador de inicio de sesión.
# Se usa como fallback cuando rclone no deja marcadores claros.
LOG_LINES=200

# Segundos de silencio en el log para considerar que la copia ha terminado.
# El resumen se envía LOG_INACTIVITY segundos después de que rclone deje
# de escribir. Auméntalo si tus copias tienen pausas largas entre ficheros.
LOG_INACTIVITY=15

# Tiempo máximo de espera en segundos antes de forzar el envío del resumen.
# Para copias de máximo 2 minutos, 300s (5 min) es un margen muy generoso.
# Auméntalo si en el futuro realizas copias más largas.
WAIT_MAX=300
